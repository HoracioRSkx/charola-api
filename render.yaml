services:
  - type: web
    name: charola-checker-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DB_PATH
        value: /opt/render/project/src/charola.db
      - key: RESET_SECRET
        generateValue: true
    disk:
      name: charola-db
      mountPath: /opt/render/project/src
      sizeGB: 1